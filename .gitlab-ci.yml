image: python:3.11-slim

stages:
  - lint
  - type_check
  - security
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - venv/

before_script:
  - python --version
  - pip install virtualenv
  - virtualenv venv
  - source venv/bin/activate
  - pip install -r requirements.txt

# Linting Stage
ruff-format:
  stage: lint
  script:
    - ruff format --check .
    - ruff check .

# Type Checking Stage
mypy-check:
  stage: type_check
  script:
    - mypy . --ignore-missing-imports

# Security Stage
security-bandit:
  stage: security
  script:
    - bandit -r . -ll

security-semgrep:
  stage: security
  image: returntocorp/semgrep
  before_script: []
  script:
    - semgrep --config auto

dependency-audit:
  stage: security
  script:
    - pip-audit

# Testing & Coverage Stage
test-coverage:
  stage: test
  script:
    - pytest --cov=. --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# Changelog Generation (Deploy/Release stage)
changelog:
  stage: deploy
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  before_script: []
  script:
    - git-cliff --output CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
  only:
    - main
