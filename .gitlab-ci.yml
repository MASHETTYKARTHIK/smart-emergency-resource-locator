image: python:3.11-slim

stages:
  - format
  - lint
  - type_check
  - security
  - test
  - coverage
  - changelog

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  VENV_PATH: "$CI_PROJECT_DIR/venv"
  PYTHONPATH: "."
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

cache:
  key:
    files:
      - requirements.txt
      - requirements-dev.txt
  paths:
    - .cache/pip

# Template for Python jobs
.python-base:
  before_script:
    - python -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install -q --upgrade pip
    - pip install --cache-dir $PIP_CACHE_DIR -q -r requirements-dev.txt
  after_script:
    - echo "Job finished"

# --- FORMAT STAGE ---
format-check:
  stage: format
  extends: .python-base
  script:
    - source $VENV_PATH/bin/activate
    - ruff format --check .

# --- LINT STAGE ---
ruff-check:
  stage: lint
  extends: .python-base
  script:
    - source $VENV_PATH/bin/activate
    - ruff check .

pylint-check:
  stage: lint
  extends: .python-base
  script:
    - source $VENV_PATH/bin/activate
    - pylint app || true

vulture-check:
  stage: lint
  extends: .python-base
  script:
    - source $VENV_PATH/bin/activate
    - vulture .

# --- TYPE CHECK STAGE ---
mypy-check:
  stage: type_check
  extends: .python-base
  script:
    - source $VENV_PATH/bin/activate
    - mypy .

# --- SECURITY STAGE ---
security-bandit:
  stage: security
  extends: .python-base
  script:
    - source $VENV_PATH/bin/activate
    - bandit -r . -ll || true

dependency-audit:
  stage: security
  extends: .python-base
  script:
    - source $VENV_PATH/bin/activate
    - pip-audit

security-semgrep:
  stage: security
  image: returntocorp/semgrep
  before_script: []
  script:
    - semgrep ci --config auto

# --- TEST STAGE ---
test-coverage:
  stage: coverage
  extends: .python-base
  script:
    - source $VENV_PATH/bin/activate
    - pytest --cov=. --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 hour

# --- CHANGELOG STAGE ---
changelog:
  stage: changelog
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  before_script:

  script:
    - git fetch --unshallow
    - git-cliff --output CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
