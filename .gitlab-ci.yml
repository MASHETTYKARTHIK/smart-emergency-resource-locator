image: python:3.11-slim

stages:
  - lint
  - type_check
  - security
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "."

cache:
  paths:
    - .cache/pip
    - venv/

before_script:
  - python --version
  - pip install virtualenv
  - virtualenv venv
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install -r requirements.txt

# Linting Stage
ruff-check:
  stage: lint
  script:
    - ruff format --check .
    - ruff check .

# Type Checking Stage
mypy-check:
  stage: type_check
  script:
    - mypy . --ignore-missing-imports

# Security Stage
security-bandit:
  stage: security
  script:
    - bandit -r . -ll -x ./tests,./venv

security-semgrep:
  stage: security
  image: returntocorp/semgrep
  before_script: []
  script:
    - semgrep --config auto

dependency-audit:
  stage: security
  script:
    # We use --allow-cyclonedx-fallback in case of network issues
    - pip-audit --fix --continue-on-error || echo "Audit found issues, but continuing as fix was attempted"

# Testing & Coverage Stage
test-coverage:
  stage: test
  script:
    - pytest --cov=. --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# Changelog Generation
changelog:
  stage: deploy
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache git || true
  script:
    - git fetch --unshallow || true
    - git-cliff --output CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
  only:
    - main
    - pipelineerrorfixing
