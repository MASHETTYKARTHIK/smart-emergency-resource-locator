image: python:3.11-slim

stages:
  - format
  - lint
  - type_check
  - security
  - test
  - coverage
  - changelog

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "."
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - venv/

before_script:
  - python --version
  - pip install virtualenv
  - virtualenv venv
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install -r requirements.txt

# --- LINT STAGE ---
ruff-check:
  stage: lint
  script:
    - ruff format --check .
    - ruff check .

# --- TYPE CHECK STAGE ---
mypy-check:
  stage: type_check
  script:
    - mypy .

# --- SECURITY STAGE ---
security-bandit:
  stage: security
  script:
    - bandit -r . -ll --config pyproject.toml

security-semgrep:
  stage: security
  image: returntocorp/semgrep
  variables:
    SEMGREP_AGENT_TOKEN: $SEMGREP_AGENT_TOKEN
  before_script: []
  script:
    - semgrep ci --config auto

dependency-audit:
  stage: security
  script:
    # Use || true to prevent job failure if vulnerabilities are found,
    # as we handle fixes in requirements.txt. Or remove || true to enforce strictness.
    - pip-audit

# --- TEST STAGE ---
test-coverage:
  stage: test
  script:
    - pytest --cov=. --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# --- DEPLOY STAGE ---
changelog:
  stage: deploy
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache git || true
  script:
    - git fetch --unshallow || true
    - git-cliff --output CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
  only:
    - main
    - pipelineerrorfixing
