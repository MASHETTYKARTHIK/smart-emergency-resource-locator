image: python:3.11-slim

stages:
  - build
  - lint
  - type_check
  - security
  - test
  - changelog

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  VENV_PATH: "$CI_PROJECT_DIR/venv"
  PYTHONPATH: "."
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

cache:
  key:
    files:
      - requirements.txt
      - requirements-dev.txt
  paths:
    - .cache/pip
    - venv/

# Template for Python jobs
.python-job:
  before_script:
    - python -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install -q --upgrade pip
  after_script:
    - echo "Job finished"

# --- BUILD STAGE ---
build-env:
  stage: build
  extends: .python-job
  script:
    - pip install -q -r requirements-dev.txt
  artifacts:
    paths:
      - venv/
    expire_in: 1 hour

# --- LINT STAGE ---
ruff-check:
  stage: lint
  extends: .python-job
  dependencies: [build-env]
  script:
    - source $VENV_PATH/bin/activate
    - ruff format --check .
    - ruff check .

# --- TYPE CHECK STAGE ---
mypy-check:
  stage: type_check
  extends: .python-job
  dependencies: [build-env]
  script:
    - source $VENV_PATH/bin/activate
    - mypy .

# --- SECURITY STAGE ---
security-bandit:
  stage: security
  extends: .python-job
  dependencies: [build-env]
  script:
    - source $VENV_PATH/bin/activate
    - bandit -r . -ll

dependency-audit:
  stage: security
  extends: .python-job
  dependencies: [build-env]
  script:
    - source $VENV_PATH/bin/activate
    - pip-audit

security-semgrep:
  stage: security
  image: returntocorp/semgrep
  script:
    - semgrep ci --config auto

# --- TEST STAGE ---
test-coverage:
  stage: test
  extends: .python-job
  dependencies: [build-env]
  script:
    - source $VENV_PATH/bin/activate
    - pytest --cov=. --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# --- CHANGELOG STAGE ---
changelog:
  stage: changelog
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache git
  script:
    - git fetch --unshallow
    - git-cliff --output CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
