# Pre-commit configuration for Smart Emergency Resource Locator
# Compliance-ready configuration

default_stages: [pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        description: "Ruff Linting: Checks for code quality issues."

      - id: ruff-format
        description: "Ruff Formatting: Ensures consistent code style."

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - pandas-stubs
        args:
          - --ignore-missing-imports
          - --exclude
          - pages
        description: "MyPy Type Checking: Validates static types."

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=88
          - --extend-ignore=E203
        description: "Flake8: Additional linting checks."

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.2
    hooks:
      - id: pyupgrade
        args:
          - --py311-plus
        description: "PyUpgrade: Upgrades syntax to modern Python."

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args:
          - -ll
        exclude: ^tests/
        description: "Bandit: Security vulnerability scanning."

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        description: "Gitleaks: Scans for secrets and sensitive data."
