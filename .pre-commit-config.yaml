# Pre-commit configuration for Smart Emergency Resource Locator
# Configured specifically for pre-push hooks to ensure compliance before pushing code.

default_stages: [push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        description: "Ruff Linting: Checks for code quality issues."

      - id: ruff-format
        description: "Ruff Formatting: Ensures consistent code style."

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - pandas-stubs
        args:
          - --ignore-missing-imports
          - --exclude
          - pages
        description: "MyPy Type Checking: Validates static types."

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        description: "Gitleaks: Scans for secrets and sensitive data."
